<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuxRides 3.4 VIP</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html, body{width:100%;height:100%;margin:0;padding:0;}
:root{
  --gold:#D4AF37;--gold-hover:#F3E5AB;--green:#22C55E;--red:#EF4444;
  --bg:#f8f8f8;--card:#ffffff;--border:rgba(0,0,0,0.12);
  --fg:#1a1a1a;--muted:rgba(0,0,0,0.6);--glass:rgba(255,255,255,0.95);
}
body{background:var(--bg);color:var(--fg);font-family:'Outfit',sans-serif;width:100%;height:100%;margin:0;padding:0;overflow:hidden;}
#map{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;background:#e8f4f8;}
#panel{
  position:fixed;z-index:1000;
  bottom:0;left:0;right:0;
  max-height:45vh;border-radius:16px 16px 0 0;
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-bottom:none;
  overflow-y:auto;overflow-x:hidden;
  transition:max-height .3s ease;
}
@media(min-width:768px){
  #panel{
    position:absolute;top:24px;left:24px;
    width:420px;max-height:calc(100vh - 48px);
    border-radius:0;border:1px solid var(--border);
    cursor: grab;
  }
}
#panel::-webkit-scrollbar{width:5px;}
#panel::-webkit-scrollbar-track{background:transparent;}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
.inner{padding:24px;}
@media(min-width:768px){.inner{padding:28px;}}
.drag-handle{display:block;width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:10px auto 0;}
@media(min-width:768px){.drag-handle{display:none;}}
.brand{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.brand h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;letter-spacing:0.2em;color:var(--gold);}
.brand p{font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
label.lbl{display:block;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:500;}
.field{margin-bottom:12px;position:relative;}
.icon-wrap{position:relative;display:flex;align-items:center;}
.icon-wrap .ico{position:absolute;left:10px;pointer-events:none;font-size:15px;}
input[type=text],input[type=date],input[type=number],select,button{
  width:100%;padding:11px 12px 11px 36px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  color:var(--fg);font-family:'Outfit',sans-serif;font-size:0.875rem;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input[type=text]::placeholder,input[type=number]::placeholder{color:rgba(255,255,255,0.25);}
input:focus,select:focus,button:focus{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
input[type=date]{color-scheme:dark;}
select{padding-left:12px;padding-right:12px;}
.suggestions{
  position:absolute;top:100%;left:0;right:0;z-index:9999;
  background:var(--card);border:1px solid var(--border);border-top:none;
  max-height:260px;overflow-y:auto;display:none;
}
.suggestions.open{display:block;}
.sug-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.sug-item:hover{background:rgba(212,175,55,0.1);}
.sug-ico{font-size:1.1rem;flex-shrink:0;margin-top:2px;}
.sug-name{font-size:0.85rem;font-weight:500;color:var(--fg);}
.sug-addr{font-size:0.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px;}
.btn-row{display:flex;gap:8px;}
.btn-toggle{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:0.85rem;cursor:pointer;
  transition:all .2s;
}
.btn-toggle.active{background:rgba(212,175,55,0.15);border-color:var(--gold);color:var(--gold);}
.btn-toggle:hover:not(.active){background:rgba(255,255,255,0.05);}
.hours-box{background:rgba(255,255,255,0.02);padding:12px;border:1px dashed var(--border);margin-bottom:12px;}
.hours-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:6px;}
.btn-hour{padding:10px 4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:0.85rem;cursor:pointer;transition:all .2s;}
.btn-hour.active{background:var(--gold);border-color:var(--gold);color:#050505;font-weight:600;}
.pax-row{display:flex;gap:6px;margin-top:6px;}
.btn-pax{flex:1;padding:10px 4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:0.85rem;cursor:pointer;transition:all .2s;}
.btn-pax.active{background:var(--gold);border-color:var(--gold);color:#050505;font-weight:600;}
.vehicle-hint{text-align:center;font-size:0.75rem;color:var(--gold);margin-top:6px;}
.tag-row{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);margin-bottom:12px;}
.tag-label{display:flex;align-items:center;gap:10px;font-size:0.875rem;color:var(--fg);}
.switch{position:relative;width:46px;height:26px;border-radius:999px;border:none;cursor:pointer;transition:background .2s;background:rgba(255,255,255,0.1);}
.switch.on{background:var(--gold);}
.switch-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s;}
.switch.on .switch-thumb{left:23px;}
.time-inputs{display:flex;align-items:center;gap:4px;margin-top:6px;}
.time-inputs input[type=number]{width:52px;padding:11px 4px;text-align:center;}
.time-colon{color:var(--muted);font-size:1.2rem;font-weight:700;}
.ampm-wrap{display:flex;}
.btn-ampm{padding:11px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:0.75rem;cursor:pointer;transition:all .2s;}
.btn-ampm:last-child{border-left:none;}
.btn-ampm.active{background:var(--gold);border-color:var(--gold);color:#050505;font-weight:600;}
#btn-calc{width:100%;padding:14px;margin-top:20px;background:var(--gold);border:none;color:#050505;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s;}
#btn-calc:hover{background:var(--gold-hover);}
#btn-calc:disabled{opacity:0.5;cursor:not-allowed;}
.spin{width:18px;height:18px;border:2px solid rgba(5,5,5,0.3);border-top-color:#050505;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
#results{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);display:none;}
.route-box{background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.05));border:1px solid var(--green);padding:12px;margin-bottom:12px;text-align:center;}
.route-label{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--green);margin-bottom:8px;}
.route-nums{display:flex;justify-content:center;gap:32px;}
.route-num{font-size:1.5rem;font-weight:700;color:var(--fg);}
.route-sub{font-size:0.68rem;text-transform:uppercase;color:var(--muted);}
.arrival-box{background:rgba(212,175,55,0.1);border:1px dashed var(--gold);padding:10px;margin-bottom:12px;text-align:center;}
.arrival-lbl{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.arrival-time{font-size:1.25rem;font-weight:600;color:var(--gold);}
.vehicle-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.vehicle-icon{font-size:1.5rem;color:var(--gold);}
.vehicle-name{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.info-cell{padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);}
.info-cell-lbl{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.info-cell-val{font-size:1.1rem;font-weight:600;}
.casetas-notice{padding:10px 12px;background:rgba(212,175,55,0.1);border-left:3px solid var(--gold);margin-bottom:12px;font-size:0.85rem;color:var(--gold);}
.price-box{display:flex;align-items:baseline;justify-content:center;gap:8px;padding:20px;background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.05));border:1px solid var(--gold);margin-bottom:12px;}
.price-label{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);}
.price-amount{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;color:var(--gold);}
.price-currency{font-size:0.9rem;color:var(--muted);}
#btn-wa{width:100%;padding:14px;border:none;background:#25D366;color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s;}
#btn-wa:hover{background:#1ebe5d;}
.date-time-row{display:flex;gap:12px;margin-bottom:12px;}
.date-time-row .date-wrap{flex:1;}
.date-time-row .time-wrap{flex:1;}
.error-msg{background:rgba(239,68,68,0.12);border:1px solid var(--red);color:#fca5a5;padding:10px 12px;margin-top:8px;font-size:0.85rem;display:none;border-radius:2px;}
</style>
</head>

<div id="map"></div>
<div id="panel">
  <div class="drag-handle"></div>
  <div class="inner">
    <div class="brand">
      <h1>LUXRIDES 3.4</h1>

    </div>

      <label class="lbl">Nombre del Cliente</label>
      <div class="icon-wrap">

        <input type="text" id="inp-nombre" placeholder="Ej: Estebanquito"/>
      </div>
    </div>

    <div class="field">
      <label class="lbl">Tipo de Servicio</label>
      <div class="btn-row">
        <button class="btn-toggle active" data-svc="I" onclick="setServicio('I')">🧭 Por Kilometraje</button>
        <button class="btn-toggle" data-svc="T" onclick="setServicio('T')">⏱️ Por Tiempo</button>
      </div>
    </div>

    <div class="hours-box" id="hours-box" style="display:none;">
      <label class="lbl">Horas de Servicio (Mínimo 2h)</label>
      <div class="hours-grid" id="hours-grid"></div>
    </div>

    <div class="field" id="field-origen">
      <label class="lbl">Origen (Recogida)</label>
      <div class="icon-wrap">
        <span class="ico">📍</span>
        <input type="text" id="inp-origen" placeholder="Ej: Club de Golf Bosques" autocomplete="off"/>
      </div>
      <div class="suggestions" id="sug-origen"></div>
    </div>

    <div class="field" id="field-destino">
      <label class="lbl">Destino Principal</label>
      <div class="icon-wrap">
        <span class="ico">🏁</span>
        <input type="text" id="inp-destino" placeholder="Ej: Pujol" autocomplete="off"/>
      </div>
      <div class="suggestions" id="sug-destino"></div>
    </div>



    <div class="date-time-row">
      <div class="date-wrap">
        <label class="lbl">Fecha</label>
        <div class="icon-wrap">
          <span class="ico">📅</span>
          <input type="date" id="inp-fecha"/>
        </div>
      </div>
      <div class="time-wrap">
        <label class="lbl">Hora</label>
        <div class="time-inputs">
          <input type="number" id="inp-hora" min="1" max="12" value="9"/>
          <span class="time-colon">:</span>
          <input type="number" id="inp-min" min="0" max="59" value="00"/>
          <div class="ampm-wrap">
            <button type="button" class="btn-ampm active" id="btn-am" onclick="setAmpm('AM')">AM</button>
            <button type="button" class="btn-ampm" id="btn-pm" onclick="setAmpm('PM')">PM</button>
          </div>
        </div>
      </div>
    </div>

    <button onclick="usarUbicacion()" style="width:100%;padding:11px;margin-bottom:12px;background:rgba(212,175,55,0.15);border:1px solid var(--gold);color:var(--gold);font-family:'Outfit',sans-serif;font-size:0.875rem;cursor:pointer;border-radius:8px;">📍 Usar mi ubicación</button>

    <div class="field">
      <label class="lbl">Pasajeros</label>
      <div class="pax-row" id="pax-row"></div>
      <div class="vehicle-hint" id="vehicle-hint">Sedán VIP Diamond</div>
    </div>

    <button id="btn-calc" onclick="calcular()"><span id="btn-calc-txt">🔍 Calcular Precio y Ruta</span><span id="spin" class="spin"></span></button>

    <div id="results">
      <div class="route-box" id="route-box">
        <div class="route-label">DISTANCIA</div>
        <div class="route-nums">
          <div><div class="route-num" id="r-km">—</div><div class="route-sub">KM</div></div>
          <div><div class="route-num" id="r-min">—</div><div class="route-sub">MIN</div></div>
        </div>
      </div>
      <div class="arrival-box" id="arrival-box">
        <div class="arrival-lbl">Hora estimada de llegada</div>
        <div class="arrival-time" id="r-arrival">—</div>
      </div>
      <div class="vehicle-row">
        <span class="vehicle-icon">🚘</span>
        <span class="vehicle-name" id="r-vehiculo">Sedán VIP Diamond</span>
      </div>
      <div class="info-grid" id="info-grid">
        <div class="info-cell"><div class="info-cell-lbl">Distancia Total</div><div class="info-cell-val" id="r-km2">—</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Tiempo de Viaje</div><div class="info-cell-val" id="r-min2">—</div></div>
      </div>
      <div class="casetas-notice" id="casetas-notice" style="display:none;"></div>
      <div class="price-box">
        <span class="price-label">Total</span>
        <span class="price-amount" id="r-precio">$0</span>
        <span class="price-currency">MXN</span>
      </div>
      <button id="btn-wa" onclick="enviarWhatsApp()">💬 Confirmar por WhatsApp</button>
    </div>

    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

      let results=LUGARES.filter(l=>l.nombre.toLowerCase().includes(q)||l.display.toLowerCase().includes(q));
      if(results.length<5){
        try{
          const r=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(inp.value)}&lat=23.5&lon=-102.0&limit=5&lang=es`);
          const d=await r.json();
          (d.features||[]).forEach(f=>{

function calcDistanceKm(lat1,lon1,lat2,lon2){
  const toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1);
  const dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)*Math.sin(dLon/2);
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return 6371*c;
}

async function calcular(){
  const nombre=document.getElementById('inp-nombre').value.trim();
  document.getElementById('error-msg').style.display='none';
  if(!nombre){mostrarError('Por favor ingresa el nombre del cliente');return;}
  if(!coordOrigen){mostrarError('Por favor selecciona un origen de la lista desplegable');return;}
  if(servicio==='I'&&!coordDestino){mostrarError('Por favor selecciona un destino de la lista desplegable');return;}
  document.getElementById('btn-calc').disabled=true;
  document.getElementById('spin').style.display='block';
  document.getElementById('btn-calc-txt').textContent='Calculando...';
  document.getElementById('results').style.display='none';
  let distanciaKm=0,duracionMin=0;
  if(servicio==='I'){
    if(routeLine){routeLine.setMap(null);routeLine=null;}
    const origin={lat:coordOrigen.lat,lng:coordOrigen.lon};
    const destination={lat:coordDestino.lat,lng:coordDestino.lon};
    try{
      const response=await new Promise((resolve,reject)=>{
        directionsService.route({
          origin, destination,
          travelMode:google.maps.TravelMode.DRIVING,
          drivingOptions:{departureTime:new Date(),trafficModel:'bestguess'},
          unitSystem:google.maps.UnitSystem.METRIC
        },(res,status)=>status==='OK'?resolve(res):reject(status));
      });
      directionsRenderer.setDirections(response);
      const route=response.routes[0].legs[0];
      distanciaKm=parseFloat((route.distance.value/1000).toFixed(1));
      duracionMin=route.duration_in_traffic?Math.max(1,Math.round(route.duration_in_traffic.value/60)):Math.max(1,Math.round(route.duration.value/60));
      map.fitBounds(response.routes[0].bounds);
    }catch(e){
      distanciaKm=parseFloat(calcDistanceKm(coordOrigen.lat,coordOrigen.lon,coordDestino.lat,coordDestino.lon).toFixed(1));
      duracionMin=Math.max(1,Math.round(distanciaKm/0.7));
      if(routeLine){routeLine.setMap(null);routeLine=null;}
      routeLine=new google.maps.Polyline({path:[{lat:coordOrigen.lat,lng:coordOrigen.lon},{lat:coordDestino.lat,lng:coordDestino.lon}],geodesic:true,strokeColor:'#D4AF37',strokeOpacity:0.8,strokeWeight:4,icons:[{icon:{path:'M 0,-1 0,1',strokeOpacity:1,scale:4},offset:'0',repeat:'10px'}],map});
      const bounds=new google.maps.LatLngBounds();
      bounds.extend(origin);
      bounds.extend(destination);
      map.fitBounds(bounds);
    }
  }
  const destText=(coordDestino?.display||'').toLowerCase();
  let casetas=0;
  if(distanciaKm>100) casetas=250;
  else if(distanciaKm>50) casetas=180;
  else if(distanciaKm>20) casetas=120;
  const casetasTotal=casetas;
  let totalPrecio;
  if(servicio==='I'){
    const base=pasajeros<=4?200:300;
    const tariffaKm=pasajeros<=4?35:45;
    totalPrecio=base+(Math.max(0,distanciaKm-4)*tariffaKm)+casetasTotal;
  } else {
    const tarifa=pasajeros<=4?550:760;
    totalPrecio=tarifa*hSel+casetasTotal;
  }
  totalPrecio = Math.round(totalPrecio * 1.13); // Aumento del 13%
  resultado={distanciaKm,duracionMin,totalPrecio,casetasTotal};
  renderResults();
  resetBtn();
}

function calcHoraLlegada(durMin){
  let h=parseInt(document.getElementById('inp-hora').value)||9;
  let m=parseInt(document.getElementById('inp-min').value)||0;
  if(ampm==='PM'&&h!==12) h+=12;
  if(ampm==='AM'&&h===12) h=0;
  let total=h*60+m+durMin;
  let hl=Math.floor(total/60)%24;
  let ml=total%60;
  const ap=hl>=12?'PM':'AM';
  if(hl>12) hl-=12;
  if(hl===0) hl=12;
  return `${hl}:${ml.toString().padStart(2,'0')} ${ap}`;
}
