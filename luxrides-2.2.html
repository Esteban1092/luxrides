<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuxRides 2.2 VIP</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#D4AF37;--gold-hover:#F3E5AB;--green:#22C55E;--red:#EF4444;
  --bg:#050505;--card:#111111;--border:rgba(255,255,255,0.1);
  --fg:#ffffff;--muted:rgba(255,255,255,0.45);--glass:rgba(10,10,10,0.88);
}
body{background:var(--bg);color:var(--fg);font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;}
#map{position:fixed;inset:0;z-index:0;}
.leaflet-container{background:#050505!important;}
.leaflet-control-attribution{background:rgba(0,0,0,0.7)!important;color:#71717a!important;font-size:10px!important;}
.leaflet-control-attribution a{color:var(--gold)!important;}
.leaflet-popup-content-wrapper{background:#111!important;color:#fff!important;border:1px solid var(--border);border-radius:4px!important;}
.leaflet-popup-tip{background:#111!important;}
.leaflet-control-zoom{display:none!important;}
#panel{
  position:fixed;z-index:1000;
  bottom:0;left:0;right:0;
  max-height:75vh;border-radius:16px 16px 0 0;
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-bottom:none;
  overflow-y:auto;overflow-x:hidden;
  transition:max-height .3s ease;
}
@media(min-width:768px){
  #panel{
    top:24px;bottom:auto;left:24px;right:auto;
    width:420px;max-height:calc(100vh - 48px);
    border-radius:0;border:1px solid var(--border);
  }
}
#panel::-webkit-scrollbar{width:5px;}
#panel::-webkit-scrollbar-track{background:transparent;}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
.inner{padding:24px;}
@media(min-width:768px){.inner{padding:28px;}}
.drag-handle{display:block;width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:10px auto 0;}
@media(min-width:768px){.drag-handle{display:none;}}
.brand{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.brand h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;letter-spacing:0.2em;color:var(--gold);}
.brand p{font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
label.lbl{display:block;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:500;}
.field{margin-bottom:12px;position:relative;}
.icon-wrap{position:relative;display:flex;align-items:center;}
.icon-wrap .ico{position:absolute;left:10px;pointer-events:none;font-size:15px;}
input[type=text],input[type=date],input[type=number]{
  width:100%;padding:11px 12px 11px 36px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  color:var(--fg);font-family:'Outfit',sans-serif;font-size:0.875rem;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input[type=text]::placeholder,input[type=number]::placeholder{color:rgba(255,255,255,0.25);}
input:focus{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
input[type=date]{color-scheme:dark;}
.suggestions{
  position:absolute;top:100%;left:0;right:0;z-index:9999;
  background:var(--card);border:1px solid var(--border);border-top:none;
  max-height:260px;overflow-y:auto;display:none;
}
.suggestions.open{display:block;}
.sug-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.sug-item:hover{background:rgba(212,175,55,0.1);}
.sug-ico{font-size:1.1rem;flex-shrink:0;margin-top:2px;}
.sug-name{font-size:0.85rem;font-weight:500;color:var(--fg);}
.sug-addr{font-size:0.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px;}
.btn-row{display:flex;gap:8px;}
.btn-toggle{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:0.85rem;cursor:pointer;
  transition:all .2s;
}
.btn-toggle.active{background:rgba(212,175,55,0.15);border-color:var(--gold);color:var(--gold);}
.btn-toggle:hover:not(.active){background:rgba(255,255,255,0.05);}
.hours-box{background:rgba(255,255,255,0.02);padding:12px;border:1px dashed var(--border);margin-bottom:12px;}
.hours-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:6px;}
.btn-hour{
  padding:10px 4px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:0.85rem;cursor:pointer;
  transition:all .2s;
}
.btn-hour.active{background:var(--gold);border-color:var(--gold);color:#050505;font-weight:600;}
.pax-row{display:flex;gap:6px;margin-top:6px;}
.btn-pax{
  flex:1;padding:10px 4px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:0.85rem;cursor:pointer;
  transition:all .2s;
}
.btn-pax.active{background:var(--gold);border-color:var(--gold);color:#050505;font-weight:600;}
.vehicle-hint{text-align:center;font-size:0.75rem;color:var(--gold);margin-top:6px;}
.tag-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);
  margin-bottom:12px;
}
.tag-label{display:flex;align-items:center;gap:10px;font-size:0.875rem;color:var(--fg);}
.switch{position:relative;width:46px;height:26px;border-radius:999px;border:none;cursor:pointer;transition:background .2s;background:rgba(255,255,255,0.1);}
.switch.on{background:var(--gold);}
.switch-thumb{
  position:absolute;top:3px;left:3px;width:20px;height:20px;
  background:#fff;border-radius:50%;transition:left .2s;
}
.switch.on .switch-thumb{left:23px;}
.time-inputs{display:flex;align-items:center;gap:4px;margin-top:6px;}
.time-inputs input[type=number]{width:52px;padding:11px 4px;text-align:center;}
.time-colon{color:var(--muted);font-size:1.2rem;font-weight:700;}
.ampm-wrap{display:flex;}
.btn-ampm{
  padding:11px 10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:0.75rem;cursor:pointer;
  transition:all .2s;
}
.btn-ampm:last-child{border-left:none;}
.btn-ampm.active{background:var(--gold);border-color:var(--gold);color:#050505;font-weight:600;}
#btn-calc{
  width:100%;padding:14px;margin-top:20px;
  background:var(--gold);border:none;color:#050505;
  font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .2s;
}
#btn-calc:hover{background:var(--gold-hover);}
#btn-calc:disabled{opacity:0.5;cursor:not-allowed;}
.spin{width:18px;height:18px;border:2px solid rgba(5,5,5,0.3);border-top-color:#050505;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
#results{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);display:none;}
.route-box{
  background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.05));
  border:1px solid var(--green);padding:12px;margin-bottom:12px;text-align:center;
}
.route-label{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--green);margin-bottom:8px;}
.route-nums{display:flex;justify-content:center;gap:32px;}
.route-num{font-size:1.5rem;font-weight:700;color:var(--fg);}
.route-sub{font-size:0.68rem;text-transform:uppercase;color:var(--muted);}
.arrival-box{
  background:rgba(212,175,55,0.1);border:1px dashed var(--gold);
  padding:10px;margin-bottom:12px;text-align:center;
}
.arrival-lbl{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.arrival-time{font-size:1.25rem;font-weight:600;color:var(--gold);}
.vehicle-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.vehicle-icon{font-size:1.5rem;color:var(--gold);}
.vehicle-name{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.info-cell{padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);}
.info-cell-lbl{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.info-cell-val{font-size:1.1rem;font-weight:600;}
.casetas-notice{
  padding:10px 12px;background:rgba(212,175,55,0.1);
  border-left:3px solid var(--gold);margin-bottom:12px;
  font-size:0.85rem;color:var(--gold);
}
.price-box{
  display:flex;align-items:baseline;justify-content:center;gap:8px;
  padding:20px;background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.05));
  border:1px solid var(--gold);margin-bottom:12px;
}
.price-label{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);}
.price-amount{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;color:var(--gold);}
.price-currency{font-size:0.9rem;color:var(--muted);}
#btn-wa{
  width:100%;padding:14px;border:none;
  background:#25D366;color:#fff;
  font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .2s;
}
#btn-wa:hover{background:#1ebe5d;}
.date-time-row{display:flex;gap:12px;margin-bottom:12px;}
.date-time-row .date-wrap{flex:1;}
.date-time-row .time-wrap{flex:1;}
.error-msg{
  background:rgba(239,68,68,0.12);border:1px solid var(--red);
  color:#fca5a5;padding:10px 12px;margin-top:8px;font-size:0.85rem;
  display:none;border-radius:2px;
}
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div class="drag-handle"></div>
  <div class="inner">

    <div class="brand">
      <h1>LUXRIDES 2.2</h1>
      <p>Transporte Ejecutivo VIP</p>
    </div>

    <div class="field">
      <label class="lbl">Nombre del Cliente</label>
      <div class="icon-wrap">
        <span class="ico">👤</span>
        <input type="text" id="inp-nombre" placeholder="Ej: Estebanquito"/>
      </div>
    </div>

    <div class="field">
      <label class="lbl">Tipo de Servicio</label>
      <div class="btn-row">
        <button class="btn-toggle active" data-svc="I" onclick="setServicio('I')">🧭 Por Kilometraje</button>
        <button class="btn-toggle" data-svc="T" onclick="setServicio('T')">⏱️ Por Tiempo</button>
      </div>
    </div>

    <div class="hours-box" id="hours-box" style="display:none;">
      <label class="lbl">Horas de Servicio (Mínimo 2h)</label>
      <div class="hours-grid" id="hours-grid"></div>
    </div>

    <div class="field" id="field-origen">
      <label class="lbl">Origen (Recogida)</label>
      <div class="icon-wrap">
        <span class="ico">📍</span>
        <input type="text" id="inp-origen" placeholder="Ej: Club de Golf Bosques" autocomplete="off"/>
      </div>
      <div class="suggestions" id="sug-origen"></div>
    </div>

    <div class="field" id="field-destino">
      <label class="lbl">Destino Principal</label>
      <div class="icon-wrap">
        <span class="ico">🏁</span>
        <input type="text" id="inp-destino" placeholder="Ej: Pujol" autocomplete="off"/>
      </div>
      <div class="suggestions" id="sug-destino"></div>
    </div>

    <div class="tag-row">
      <div class="tag-label"><span style="color:var(--gold)">🚗</span> Tag Pase / Segundo Piso</div>
      <button class="switch" id="switch-tag" onclick="toggleTag()"><span class="switch-thumb"></span></button>
    </div>

    <div class="date-time-row">
      <div class="date-wrap">
        <label class="lbl">Fecha</label>
        <div class="icon-wrap">
          <span class="ico">📅</span>
          <input type="date" id="inp-fecha"/>
        </div>
      </div>
      <div class="time-wrap">
        <label class="lbl">Hora de Recogida</label>
        <div class="time-inputs">
          <input type="number" id="inp-hora" value="9" min="1" max="12" style="padding-left:4px!important;"/>
          <span class="time-colon">:</span>
          <input type="number" id="inp-min" value="00" min="0" max="59" style="padding-left:4px!important;"/>
          <div class="ampm-wrap">
            <button class="btn-ampm active" id="btn-am" onclick="setAmpm('AM')">AM</button>
            <button class="btn-ampm" id="btn-pm" onclick="setAmpm('PM')">PM</button>
          </div>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="lbl">Número de Pasajeros</label>
      <div class="pax-row" id="pax-row"></div>
      <div class="vehicle-hint" id="vehicle-hint">Sedán VIP Diamond</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button id="btn-calc" onclick="calcular()">
      <div class="spin" id="spin"></div>
      <span id="btn-calc-txt">🔍 Calcular Precio y Ruta</span>
    </button>

    <div id="results">
      <div class="route-box" id="route-box">
        <div class="route-label">📍 Ruta Calculada</div>
        <div class="route-nums">
          <div><div class="route-num" id="r-km">—</div><div class="route-sub">Kilómetros</div></div>
          <div><div class="route-num" id="r-min">—</div><div class="route-sub">Minutos</div></div>
        </div>
      </div>
      <div class="arrival-box" id="arrival-box">
        <div class="arrival-lbl">⏰ Hora estimada de llegada</div>
        <div class="arrival-time" id="r-arrival">—</div>
      </div>
      <div class="vehicle-row">
        <span class="vehicle-icon">🚘</span>
        <span class="vehicle-name" id="r-vehiculo">Sedán VIP Diamond</span>
      </div>
      <div class="info-grid" id="info-grid">
        <div class="info-cell"><div class="info-cell-lbl">Distancia Total</div><div class="info-cell-val" id="r-km2">—</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Tiempo de Viaje</div><div class="info-cell-val" id="r-min2">—</div></div>
      </div>
      <div class="casetas-notice" id="casetas-notice" style="display:none;"></div>
      <div class="price-box">
        <span class="price-label">Total</span>
        <span class="price-amount" id="r-precio">$0</span>
        <span class="price-currency">MXN</span>
      </div>
      <button id="btn-wa" onclick="enviarWhatsApp()">💬 Confirmar por WhatsApp</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const ICONOS = {hotel:'🏨',airport:'✈️',restaurant:'🍽️',park:'🌳',shopping:'🛍️',business:'🏢',neighborhood:'🏘️',city:'🌆',landmark:'🏛️',municipality:'📍',golf:'⛳',state:'🏞️'};

const map = L.map('map', { center:[19.4326,-99.1332], zoom:11, zoomControl:false });

  maxZoom:19

function makeIcon(color, emoji){
  const size = 28;
  const inner = emoji
    ? `<circle cx="12" cy="12" r="6" fill="#050505"/><text x="12" y="16" text-anchor="middle" font-size="9" fill="#fff">${emoji}</text>`
    : `<circle cx="12" cy="12" r="5" fill="#fff"/>`;
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="${size}" height="${size*1.5}">
      <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24c0-6.6-5.4-12-12-12z" fill="${color}"/>
      ${inner}
    </svg>`,
    className:'', iconSize:[size, size*1.5], iconAnchor:[size/2, size*1.5]
  });
}

const greenIcon = makeIcon('#22C55E');
const redIcon   = makeIcon('#EF4444');

// ─── BÚSQUEDA DE LUGARES ────────────────────────────────────
let timerOri = null, timerDes = null;

function setupSearch(inputId, sugId){
  const inp = document.getElementById(inputId);
  const sug = document.getElementById(sugId);

  inp.addEventListener('input', () => {
    if(inputId==='inp-origen') clearTimeout(timerOri); else clearTimeout(timerDes);
    const q = inp.value.trim().toLowerCase();
    if(q.length < 2){ sug.classList.remove('open'); sug.innerHTML=''; return; }

    const t = setTimeout(async () => {
      let results = LUGARES.filter(l =>
        l.nombre.toLowerCase().includes(q) || l.display.toLowerCase().includes(q)
      );

      if(results.length < 5){
        try{
          const r = await fetch(
            `https://photon.komoot.io/api/?q=${encodeURIComponent(inp.value)}&lat=19.43&lon=-99.13&limit=5&lang=es`
          );
          const d = await r.json();
          (d.features || []).forEach(f => {
            const p = f.properties, c = f.geometry.coordinates;
            const nombre = p.name || '';
            let parts = [nombre];
            if(p.city && p.city !== nombre) parts.push(p.city);
            if(p.state && !parts.includes(p.state)) parts.push(p.state);
            const display = parts.filter(Boolean).join(', ');
            if(!results.find(r => r.nombre===nombre && Math.abs(r.lat-c[1])<0.001))
              results.push({ nombre: nombre||display, display, lat:c[1], lon:c[0], tipo:p.osm_value||'place' });
          });
        }catch(e){}
      }

      results = results.slice(0, 8);
      // Guardar en caché JS
      sugCache[inputId] = results;

      sug.innerHTML = results.map((s, i) => `
        <div class="sug-item" data-idx="${i}">
          <span class="sug-ico">${getIcono(s.tipo)}</span>
          <div>
            <div class="sug-name">${s.nombre}</div>
            <div class="sug-addr">${s.display}</div>
          </div>
        </div>`).join('');

      sug.classList.toggle('open', results.length > 0);
    }, 300);

    if(inputId==='inp-origen') timerOri=t; else timerDes=t;
  });

  // Delegación de eventos — sin onclick en el HTML generado
  sug.addEventListener('mousedown', e => {
    const item = e.target.closest('.sug-item');
    if(!item) return;
    e.preventDefault(); // Evita que el input pierda foco antes de seleccionar
    const idx = parseInt(item.dataset.idx);
    selectSug(idx, inputId, sugId);
  });

  document.addEventListener('click', e => {
    if(!inp.contains(e.target) && !sug.contains(e.target))
      sug.classList.remove('open');
  });
}

function selectSug(idx, inputId, sugId){
  const item = sugCache[inputId][idx];
  if(!item) return;

  document.getElementById(inputId).value = item.display;
  document.getElementById(sugId).classList.remove('open');

  if(inputId === 'inp-origen'){
    coordOrigen = { lat:item.lat, lon:item.lon, display:item.display };
    if(markerOrigen) map.removeLayer(markerOrigen);
    markerOrigen = L.marker([item.lat, item.lon], {icon:greenIcon}).addTo(map)
      .bindPopup(`<strong>Origen</strong><br>${item.display}`);
    map.setView([item.lat, item.lon], 14);
  } else {
    coordDestino = { lat:item.lat, lon:item.lon, display:item.display };
    if(markerDestino) map.removeLayer(markerDestino);
    markerDestino = L.marker([item.lat, item.lon], {icon:redIcon}).addTo(map)
      .bindPopup(`<strong>Destino</strong><br>${item.display}`);
  }
}

setupSearch('inp-origen', 'sug-origen');
setupSearch('inp-destino', 'sug-destino');

// ─── CALCULAR ───────────────────────────────────────────────
function mostrarError(msg){
  const el = document.getElementById('error-msg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function resetBtn(){
  document.getElementById('btn-calc').disabled = false;
  document.getElementById('spin').style.display = 'none';
  document.getElementById('btn-calc-txt').textContent = '🔍 Calcular Precio y Ruta';
}

function calcDistanceKm(lat1, lon1, lat2, lon2){
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return 6371 * c;
}

async function calcular(){
  const nombre = document.getElementById('inp-nombre').value.trim();
  document.getElementById('error-msg').style.display = 'none';

  if(!nombre)     { mostrarError('Por favor ingresa el nombre del cliente'); return; }
  if(!coordOrigen){ mostrarError('Por favor selecciona un origen de la lista desplegable'); return; }
  if(servicio==='I' && !coordDestino){ mostrarError('Por favor selecciona un destino de la lista desplegable'); return; }

  document.getElementById('btn-calc').disabled = true;
  document.getElementById('spin').style.display = 'block';
  document.getElementById('btn-calc-txt').textContent = 'Calculando...';
  document.getElementById('results').style.display = 'none';

  let distanciaKm = 0, duracionMin = 0;

  if(servicio === 'I'){
    if(routeLine){ map.removeLayer(routeLine); routeLine = null; }
    const url = `https://router.project-osrm.org/route/v1/driving/${coordOrigen.lon},${coordOrigen.lat};${coordDestino.lon},${coordDestino.lat}?overview=full&geometries=geojson`;
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000); // Aumentar a 10s
      const resp = await fetch(url, { signal: controller.signal });
      clearTimeout(timeout);
      if(!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      if(data && data.code === 'Ok' && data.routes?.length){
        const route = data.routes[0];
        distanciaKm = parseFloat((route.distance / 1000).toFixed(1));
        duracionMin = Math.max(1, Math.round(route.duration / 60));
        const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
        routeLine = L.polyline(coords, {color:'#D4AF37', weight:4, opacity:0.9}).addTo(map);
        map.fitBounds(L.latLngBounds(coords), {padding:[50,50]});
      } else {
        throw new Error('Ruta no disponible');
      }
    } catch(e) {
      // Fallback con distancia real y línea punteada
      distanciaKm = parseFloat((calcDistanceKm(coordOrigen.lat, coordOrigen.lon, coordDestino.lat, coordDestino.lon)).toFixed(1));
      duracionMin = Math.max(1, Math.round(distanciaKm / 0.7));
      const coords = [[coordOrigen.lat, coordOrigen.lon], [coordDestino.lat, coordDestino.lon]];
      routeLine = L.polyline(coords, {color:'#D4AF37', weight:4, opacity:0.7, dashArray:'8,6'}).addTo(map);
      map.fitBounds(L.latLngBounds(coords), {padding:[50,50]});
    }
  }

  // Casetas
  const destText = (coordDestino?.display || '').toLowerCase();
  let casetas = 0;
  if(destText.includes('puebla'))                                          casetas = 216;
  else if(destText.includes('cuernavaca'))                                 casetas = 149;
  else if(destText.includes('queretaro') || destText.includes('querétaro')) casetas = 204;
  if(tagActivo) casetas += 120;
  const casetasTotal = casetas * 2;

  // Precio
  let totalPrecio;
  if(servicio === 'I'){
    const base    = pasajeros <= 4 ? 200 : 300;
    const extraKm = pasajeros <= 4 ? 35  : 45;
    const kmExtra = Math.max(0, distanciaKm - 4);
    totalPrecio = base + kmExtra * extraKm + casetasTotal;
  } else {
    const tarifa = pasajeros <= 4 ? 550 : 760;
    totalPrecio  = tarifa * hSel + casetasTotal;
  }

  resultado = { distanciaKm, duracionMin, totalPrecio, casetasTotal };
  renderResults();
  resetBtn();
}

function renderResults(){
  const { distanciaKm, duracionMin, totalPrecio, casetasTotal } = resultado;
  const vehiculo = pasajeros <= 4 ? 'Sedán VIP Diamond' : 'SUV Platinum Diamond';
  const esKm = servicio === 'I';

  document.getElementById('results').style.display    = 'block';
  document.getElementById('route-box').style.display  = esKm ? 'block' : 'none';
  document.getElementById('arrival-box').style.display = esKm ? 'block' : 'none';
  document.getElementById('info-grid').style.display  = esKm ? 'grid'  : 'none';

  if(esKm){
    document.getElementById('r-km').textContent     = distanciaKm;
    document.getElementById('r-min').textContent    = duracionMin;
    document.getElementById('r-km2').textContent    = distanciaKm + ' km';
    document.getElementById('r-min2').textContent   = duracionMin + ' min';
    document.getElementById('r-arrival').textContent = calcHoraLlegada(duracionMin);
  }

  document.getElementById('r-vehiculo').textContent = vehiculo;
  document.getElementById('r-precio').textContent   = '$' + totalPrecio.toLocaleString();

  const casetasEl = document.getElementById('casetas-notice');
  if(casetasTotal > 0){
    casetasEl.style.display = 'block';
    casetasEl.textContent   = `Casetas incluidas: $${casetasTotal.toLocaleString()} MXN`;
  } else {
    casetasEl.style.display = 'none';
  }
}

function calcHoraLlegada(durMin){
  let h = parseInt(document.getElementById('inp-hora').value) || 9;
  let m = parseInt(document.getElementById('inp-min').value)  || 0;
  if(ampm === 'PM' && h !== 12) h += 12;
  if(ampm === 'AM' && h === 12) h = 0;
  let total = h * 60 + m + durMin;
  let hl = Math.floor(total / 60) % 24;
  let ml = total % 60;
  const ap = hl >= 12 ? 'PM' : 'AM';
  if(hl > 12) hl -= 12;
  if(hl === 0) hl = 12;
  return `${hl}:${ml.toString().padStart(2,'0')} ${ap}`;
}

    `━━━━━━━━━━━━━━━━━`,
    `💰 *TOTAL: $${resultado.totalPrecio.toLocaleString()} MXN*`,
  ].filter(l => l !== '').join('\n');

  window.open(`https://wa.me/525527729551?text=${encodeURIComponent(lines)}`, '_blank');
}
